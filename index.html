<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histology MCQ – Question Bank 2023–2025</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;1,900&display=swap');
:root{
  --bg:#0d0f14;--surface:#161a24;--border:#1f2535;
  --accent:#4d7fa6;--accentLight:#6aa3cc;
  --correct:#3d9162;--correctBg:#0f2318;
  --wrong:#b85a5a;--wrongBg:#2a0f0f;
  --text:#e4e8f0;--muted:#6b7280;--flag:#d4a843;
  --nav-h:52px;--radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;min-height:100vh;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent;}
img{max-width:100%;display:block;}
.hidden{display:none !important;}
.wrap{max-width:600px;margin:0 auto;padding:0 1rem 5rem;}
.screen{min-height:calc(100vh - var(--nav-h));}

/* NAV */
#app-nav{
  position:sticky;top:0;z-index:200;background:#0e1117;
  border-bottom:1px solid #1e2535;height:var(--nav-h);
  padding:0 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;
}
.nav-left{display:flex;align-items:center;gap:.55rem;min-width:0;}
.nav-logo{height:30px;width:auto;flex-shrink:0;}
.nav-wordmark{display:flex;align-items:baseline;line-height:1;white-space:nowrap;}
.nav-med{font-family:'Montserrat',Inter,sans-serif;font-style:italic;font-weight:900;font-size:.95rem;color:#fff;letter-spacing:-.02em;}
.nav-hack{font-family:'Montserrat',Inter,sans-serif;font-weight:900;font-size:.95rem;color:#fff;letter-spacing:-.02em;}
.nav-tut{font-family:'Montserrat',Inter,sans-serif;font-weight:400;font-size:.95rem;color:#fff;letter-spacing:.01em;margin-left:.18em;}
.nav-pipe{width:1px;height:18px;background:#3a4455;margin:0 .7rem;flex-shrink:0;align-self:center;}
.nav-subject{font-family:'Montserrat',Inter,sans-serif;font-weight:400;font-size:.65rem;letter-spacing:.28em;color:#6b7280;text-transform:uppercase;white-space:nowrap;}
.nav-slogan{font-size:.58rem;letter-spacing:.09em;color:#4a5568;text-transform:uppercase;font-style:italic;white-space:nowrap;flex-shrink:0;}

/* MENU */
#menu-header{text-align:center;padding:1.75rem 0 1.25rem;}
#menu-header h1{font-size:1.6rem;font-weight:800;letter-spacing:-.03em;color:#fff;line-height:1.2;}
#menu-header .subtitle{color:var(--muted);margin-top:.4rem;font-size:.82rem;}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:1rem;margin-bottom:.85rem;}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;}
.card-head span.lbl{font-size:.68rem;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;}
.chiprow{display:flex;gap:.4rem;flex-wrap:wrap;}
.chip{font-size:.72rem;padding:.25rem .7rem;border-radius:20px;background:#1e2535;color:var(--muted);border:1px solid var(--border);}
.sec-row{display:flex;align-items:center;gap:.65rem;padding:.7rem .4rem;border-bottom:1px solid var(--border);cursor:pointer;border-radius:6px;transition:background .1s;}
.sec-row:last-child{border-bottom:none;}
.checkbox{width:20px;height:20px;border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.checkbox.on{border-color:var(--accent);background:var(--accent);}
.checkbox.on::after{content:"✓";color:#fff;font-size:11px;font-weight:800;}
.sec-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sec-name{flex:1;font-size:.84rem;color:var(--muted);min-width:0;}
.sec-name.on{color:var(--text);}
.sec-count{font-size:.7rem;color:var(--muted);background:#1e2535;padding:.15rem .5rem;border-radius:20px;white-space:nowrap;flex-shrink:0;}
#start-btn{width:100%;padding:1rem;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:1rem;font-weight:700;min-height:52px;}
#start-btn:disabled{background:var(--border);color:var(--muted);opacity:.6;cursor:default;}

/* COUNT PICKER */
.back-row{display:flex;align-items:center;gap:.6rem;margin-bottom:1.25rem;padding-top:1.25rem;}
.back-btn{font-size:.78rem;padding:.4rem .85rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);min-height:36px;}
.count-header{margin-bottom:1.25rem;}
.count-header h2{font-size:1.25rem;font-weight:800;color:#fff;margin-bottom:.3rem;}
.count-header p{font-size:.8rem;color:var(--muted);}
.count-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:.65rem;}
.count-btn{padding:.85rem .4rem;border-radius:var(--radius-sm);background:var(--surface);border:2px solid var(--border);color:var(--muted);font-size:.95rem;font-weight:700;transition:all .15s;text-align:center;min-height:52px;}
.count-btn.selected{border-color:var(--accent);background:#1a2436;color:var(--accentLight);}
.count-btn.max-btn{grid-column:1/-1;background:linear-gradient(135deg,#1a2d40,#162235);border-color:var(--accent);color:var(--accent);font-size:.88rem;min-height:48px;}
.count-btn.max-btn.selected{background:var(--accent);color:#fff;}
.count-note{font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:1rem;min-height:1rem;}
.shuffle-count-row{display:flex;align-items:center;gap:.7rem;cursor:pointer;padding:.8rem 1rem;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:1rem;min-height:52px;}
.custom-input-row{margin:0 0 .75rem;}
.custom-label{display:block;font-size:.68rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.4rem;}
.custom-spinner{display:flex;align-items:stretch;border-radius:var(--radius-sm);border:1.5px solid var(--border);overflow:hidden;background:var(--surface);transition:border-color .15s;}
.custom-spinner:focus-within{border-color:var(--accent);}
#custom-count-input{flex:1;background:transparent;border:none;color:var(--text);font-family:inherit;font-size:1.1rem;font-weight:700;padding:.7rem .9rem;outline:none;min-width:0;}
#custom-count-input::placeholder{color:var(--muted);font-weight:400;font-size:.88rem;}
.spinner-btns{display:flex;flex-direction:column;border-left:1.5px solid var(--border);}
.spin-btn{background:transparent;border:none;color:var(--muted);padding:0 .85rem;font-size:.65rem;cursor:pointer;flex:1;transition:background .1s,color .1s;line-height:1;user-select:none;-webkit-user-select:none;min-width:44px;}
.spin-btn:active{background:#2a3040;color:var(--text);}
.custom-error{font-size:.72rem;color:var(--wrong);margin-top:.35rem;}
#launch-btn{width:100%;padding:1rem;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:1rem;font-weight:700;min-height:52px;}
#launch-btn:disabled{background:var(--border);color:var(--muted);opacity:.6;cursor:default;}

/* EXAM */
#exam-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1rem;position:sticky;top:var(--nav-h);z-index:10;}
#exam-topbar .row{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:.6rem;}
.exit-btn{font-size:.72rem;padding:.35rem .65rem;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--muted);flex-shrink:0;min-height:36px;white-space:nowrap;}
.progress-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width .3s ease;}
.counter{font-size:.72rem;color:var(--muted);white-space:nowrap;}
.flag-btn{font-size:1.2rem;padding:.2rem .45rem;border-radius:6px;background:transparent;color:var(--border);min-width:36px;text-align:center;}
.flag-btn.on{color:var(--flag);}
#exam-body{padding:1.4rem 1rem 7rem;}
.q-sec{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.45rem;font-weight:600;}
.q-text{font-size:.98rem;font-weight:700;line-height:1.65;margin-bottom:1.35rem;color:#f0f2f8;}
.q-num{color:var(--muted);font-weight:400;font-size:.88rem;}
.opt{display:block;width:100%;padding:.85rem 1rem;border-radius:var(--radius-sm);background:var(--surface);color:var(--text);border:1px solid var(--border);text-align:left;font-size:.88rem;line-height:1.45;margin-bottom:.5rem;transition:border-color .15s,background .15s;min-height:48px;}
.opt:active:not(:disabled){border-color:var(--accent);background:#1a2436;}
.opt .letter{opacity:.4;margin-right:.5rem;font-weight:700;}
.opt.correct{background:var(--correctBg);color:var(--correct);border-color:var(--correct);font-weight:600;}
.opt.wrong{background:var(--wrongBg);color:var(--wrong);border-color:var(--wrong);}
.opt.dim{color:var(--muted);}
.reveal-btn{margin-top:.9rem;font-size:.78rem;padding:.4rem .95rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);min-height:36px;}

/* Loading state */
.loading-opts{display:flex;flex-direction:column;gap:.5rem;}
.opt-skeleton{height:48px;border-radius:var(--radius-sm);background:linear-gradient(90deg,var(--surface) 25%,#1d2337 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.loading-badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.7rem;color:var(--muted);margin-bottom:.9rem;padding:.35rem .75rem;border-radius:20px;border:1px solid var(--border);background:var(--surface);}
.loading-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.1s infinite alternate;}
@keyframes pulse{from{opacity:.3}to{opacity:1}}

#exam-footer{background:var(--surface);border-top:1px solid var(--border);padding:.85rem 1rem;position:sticky;bottom:0;z-index:10;}
#exam-footer .row{max-width:600px;margin:0 auto;display:flex;gap:.6rem;}
.nav-btn{flex:1;padding:.8rem;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--muted);font-weight:600;font-size:.88rem;min-height:50px;}
.nav-btn.next{flex:2;background:var(--accent);color:#fff;border:none;font-weight:700;}
.nav-btn.finish{flex:2;background:var(--correct);color:#fff;border:none;font-weight:700;}
.nav-btn:disabled{color:var(--border);pointer-events:none;}

/* RESULTS */
#screen-results .wrap{padding-top:1.75rem;}
.results-header{text-align:center;margin-bottom:1.5rem;}
.results-emoji{font-size:3.5rem;margin-bottom:.6rem;}
.results-title{font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:.5rem;}
.score-ring{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:130px;height:130px;border-radius:50%;margin:.5rem auto .85rem;border:4px solid var(--border);}
.score-ring.pass{border-color:var(--correct);background:var(--correctBg);}
.score-ring.fail{border-color:var(--wrong);background:var(--wrongBg);}
.score-big{font-size:2rem;font-weight:800;line-height:1;}
.score-ring.pass .score-big{color:var(--correct);}
.score-ring.fail .score-big{color:var(--wrong);}
.score-label{font-size:.7rem;color:var(--muted);margin-top:.2rem;}
.grade-badge{display:inline-block;font-size:.8rem;font-weight:700;padding:.3rem .9rem;border-radius:20px;margin-bottom:1.25rem;}
.grade-badge.pass{background:var(--correctBg);color:var(--correct);border:1px solid var(--correct);}
.grade-badge.fail{background:var(--wrongBg);color:var(--wrong);border:1px solid var(--wrong);}
.results-stats{display:flex;gap:.5rem;margin-bottom:1.25rem;}
.rstat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.7rem .4rem;text-align:center;}
.rstat strong{display:block;font-size:1.3rem;font-weight:800;margin-bottom:.12rem;}
.rstat span{font-size:.65rem;color:var(--muted);}
.rstat.green strong{color:var(--correct);}
.rstat.red strong{color:var(--wrong);}
.rstat.blue strong{color:var(--accentLight);}
.results-actions{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1.25rem;}
.action-btn{width:100%;padding:.9rem 1rem;border-radius:var(--radius);font-size:.92rem;font-weight:700;text-align:center;min-height:52px;transition:opacity .15s;}
.action-btn.primary{background:var(--accent);color:#fff;}
.action-btn.secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);}
.action-btn.danger{background:transparent;color:var(--muted);border:1px solid var(--border);}
.action-btn:active{opacity:.8;}
.results-divider{border:none;border-top:1px solid var(--border);margin:1.1rem 0;}
.review-section-title{font-size:.68rem;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;margin-bottom:.7rem;}
.filterrow{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem;}
.filterbtn{font-size:.72rem;padding:.35rem .85rem;border-radius:20px;background:#1e2535;color:var(--muted);border:1px solid var(--border);cursor:pointer;min-height:34px;}
.filterbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.review-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:var(--radius-sm);padding:1rem;margin-bottom:.6rem;}
.review-card.rc-correct{border-left-color:var(--correct);}
.review-card.rc-wrong{border-left-color:var(--wrong);}
.review-card.rc-skipped{border-left-color:var(--muted);}
.rc-q{font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:.5rem;line-height:1.5;}
.rc-your{font-size:.78rem;margin-bottom:.25rem;}
.rc-correct-ans{font-size:.78rem;color:var(--correct);}
.rc-wrong-ans{color:var(--wrong);}
.rc-skip-ans{color:var(--muted);}
.rc-sec{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
.flagged-tag{font-size:.68rem;color:var(--flag);margin-top:.4rem;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:300;padding:1.25rem;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.6rem 1.35rem;max-width:320px;width:100%;text-align:center;}
.modal-box h3{font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:.45rem;}
.modal-box p{font-size:.83rem;color:var(--muted);margin-bottom:1.35rem;line-height:1.5;}
.modal-btns{display:flex;gap:.7rem;}
.modal-btn{flex:1;padding:.85rem;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;border:none;min-height:48px;}
.modal-btn.cancel{background:#1e2535;color:var(--muted);border:1px solid var(--border);}
.modal-btn.confirm{background:var(--wrong);color:#fff;}

/* SECTION COLOURS */
.dot-0{background:#4d7fa6;}.dot-1{background:#9b59b6;}.dot-2{background:#e67e22;}.dot-3{background:#27ae60;}
.dot-4{background:#e74c3c;}.dot-5{background:#1abc9c;}.dot-6{background:#f39c12;}.dot-7{background:#3498db;}
.dot-8{background:#e91e63;}.dot-9{background:#00bcd4;}.dot-10{background:#8bc34a;}.dot-11{background:#ff5722;}
.dot-12{background:#607d8b;}.dot-13{background:#9c27b0;}.dot-14{background:#ff9800;}.dot-15{background:#2196f3;}
.dot-16{background:#4caf50;}.dot-17{background:#f44336;}.dot-18{background:#795548;}

@media(hover:hover){
  .chip:hover{border-color:var(--accent);color:var(--text);}
  .sec-row:hover{background:#1a1f2e;}
  .count-btn:hover{border-color:var(--accent);color:var(--text);}
  .opt:hover:not(:disabled){border-color:var(--accent);background:#1a2436;}
  .reveal-btn:hover{border-color:var(--text);color:var(--text);}
  .exit-btn:hover{border-color:var(--text);color:var(--text);}
  .back-btn:hover{border-color:var(--text);color:var(--text);}
  .nav-btn:hover:not(:disabled){border-color:var(--text);color:var(--text);}
  .action-btn:hover{opacity:.85;}
  .modal-btn.cancel:hover{color:var(--text);border-color:var(--text);}
  .modal-btn.confirm:hover{opacity:.85;}
}
@media(max-width:480px){
  .nav-pipe,.nav-subject,.nav-slogan{display:none;}
  .nav-logo{height:26px;}
  .nav-med,.nav-hack,.nav-tut{font-size:.88rem;}
  #menu-header{padding:1.25rem 0 1rem;}
  #menu-header h1{font-size:1.35rem;}
  .count-header h2{font-size:1.1rem;}
  .count-grid{grid-template-columns:repeat(3,1fr);gap:.4rem;}
  .count-btn{font-size:.88rem;padding:.7rem .3rem;min-height:48px;}
  .opt{font-size:.85rem;padding:.75rem .85rem;}
  .q-text{font-size:.93rem;}
  .rstat strong{font-size:1.15rem;}
  .rstat span{font-size:.6rem;}
}
@media(max-width:360px){
  .wrap{padding:0 .75rem 5rem;}
  .count-grid{grid-template-columns:repeat(2,1fr);}
  .count-btn.max-btn{grid-column:1/-1;}
}
</style>

sent in the ECM and in the ground substance of loose connective tissue?", "a": "laminin"}, {"q": "Which statement about fibroblasts is true?", "a": "they take part in reducing bleeding after transforming into myofibroblasts"}, {"q": "Which part of the mammary gland does NOT derive from ectoderm?", "a": "the adipose tissue"}, {"q": "What is present in connective tissue but absent from the ground substance?", "a": "reticulin"}, {"q": "How do elastic laminae and fibres stain?", "a": "acidophilic (eosinophilic)"}, {"q": "What is the function of leptin secreted by the adipocyte?", "a": "participation in the regulation of satiety / hunger"}, {"q": "A 10–30 µm cell with granules and a folded membrane — what is it?", "a": "a macrophage"}, {"q": "What cell is this: lots of collagen around it, spindle-shaped, with a single process in the centre?", "a": "a fibrocyte"}]}, {"name": "Supporting Connective Tissues: Cartilage and Bone", "questions": [{"q": "When does hypertrophy of chondrocytes occur?", "a": "endochondral ossification"}, {"q": "Fibrous cartilage — where is it found?", "a": "the pubic symphysis"}, {"q": "What increases bone resorption by osteoclasts?", "a": "parathyroid hormone (PTH)"}, {"q": "What happens in the zone of calcifying cartilage?", "a": "hydroxyapatite crystals form"}, {"q": "How is woven bone built?", "a": "irregularly arranged collagen fibres running in various directions"}, {"q": "Which part of cartilage has a lot of proteoglycans and little collagen?", "a": "the territorial matrix"}, {"q": "In which zone of endochondral ossification do the cells undergo apoptosis?", "a": "the zone of calcifying cartilage"}, {"q": "What is the outer boundary of an osteon?", "a": "the cement line"}, {"q": "A true statement about fibrous cartilage:", "a": "it is built of dense connective tissue"}, {"q": "Where does type II collagen predominate?", "a": "in cartilage"}, {"q": "What precedes the formation of bone callus during bone regeneration?", "a": "the formation of f // Assign colours
const DOT_CLASSES = Array.from({length:19},(_,i)=>`dot-${i}`);

// ── State ──
let selectedSections = new Set(SECTIONS.map((_,i)=>i));
let pool = [];        // [{sIdx, qIdx, q, a}]
let exam = [];        // same shape, subset
let answers = {};     // idx -> {chosen, correct, revealed}
let flags = new Set();
let cur = 0;
let shuffleOn = true;
let chosenCount = null;
let questionOptions = {}; // cache: idx -> [{text, isCorrect}]

// ── Screen router ──
const screens = ['screen-menu','screen-count','screen-exam','screen-results'];
function show(id){ screens.forEach(s=>{ const el=document.getElementById(s); if(el) el.classList.toggle('hidden',s!==id); }); }

// ── Build menu ──
function buildMenu(){
  const list = document.getElementById('sec-list');
  list.innerHTML = '';
  SECTIONS.forEach((sec,i)=>{
    const row = document.createElement('div');
    row.className = 'sec-row';
    row.innerHTML = `<div class="checkbox ${selectedSections.has(i)?'on':''}" id="cb-${i}"></div>
      <div class="sec-dot ${DOT_CLASSES[i%DOT_CLASSES.length]}"></div>
      <span class="sec-name ${selectedSections.has(i)?'on':''}">${sec.name}</span>
      <span class="sec-count">${sec.questions.length}</span>`;
    row.addEventListener('click',()=>toggleSection(i));
    list.appendChild(row);
  });
  updateMenuSub();
}

function toggleSection(i){
  if(selectedSections.has(i)) selectedSections.delete(i);
  else selectedSections.add(i);
  document.getElementById(`cb-${i}`).className = `checkbox ${selectedSections.has(i)?'on':''}`;
  document.querySelector(`#sec-list .sec-row:nth-child(${i+1}) .sec-name`).className = `sec-name ${selectedSections.has(i)?'on':''}`;
  updateMenuSub();
}

function updateMenuSub(){
  const total = Array.from(selectedSections).reduce((s,i)=>s+SECTIONS[i].questions.length,0);
  document.getElementById('menu-sub').textContent = `${selectedSections.size} section${selectedSections.size!==1?'s':''} · ${total} question${total!==1?'s':''}`;
  document.getElementById('start-btn').disabled = selectedSections.size === 0;
}

document.getElementById('sel-all').addEventListener('click',()=>{ SECTIONS.forEach((_,i)=>selectedSections.add(i)); buildMenu(); });
document.getElementById('sel-none').addEventListener('click',()=>{ selectedSections.clear(); buildMenu(); });
document.getElementById('start-btn').addEventListener('click',()=>{ buildPool(); showCountPicker(); });

// ── Pool ──
function buildPool(){
  pool = [];
  Array.from(selectedSections).sort((a,b)=>a-b).forEach(sIdx=>{
    SECTIONS[sIdx].questions.forEach((q,qIdx)=>{
      pool.push({sIdx, qIdx, q:q.q, a:q.a});
    });
  });
}

// ── Count picker ──
const PRESETS = [30,60,90,120,150,180];
let spinTimer = null, spinInterval = null;

function showCountPicker(){
  const poolSize = pool.length;
  document.getElementById('count-pool-label').textContent = `${poolSize} questions available`;
  
  // Build preset grid
  const grid = document.getElementById('count-grid');
  grid.innerHTML = '';
  PRESETS.forEach(n=>{
    const btn = document.createElement('button');
    btn.className = 'count-btn' + (chosenCount===n?' selected':'');
    btn.textContent = n;
    btn.disabled = n > poolSize;
    if(n > poolSize) btn.style.opacity='.35';
    btn.addEventListener('click',()=>{ chosenCount=n; document.getElementById('custom-count-input').value=''; refreshCountGrid(); validateCount(); });
    grid.appendChild(btn);
  });
  // Max button
  const maxBtn = document.createElement('button');
  maxBtn.className = 'count-btn max-btn' + (chosenCount===poolSize?' selected':'');
  maxBtn.textContent = `Max (${poolSize} questions)`;
  maxBtn.addEventListener('click',()=>{ chosenCount=poolSize; document.getElementById('custom-count-input').value=''; refreshCountGrid(); validateCount(); });
  grid.appendChild(maxBtn);

  document.getElementById('count-note').textContent = '';
  updateLaunchBtn();
  show('screen-count');
}

function refreshCountGrid(){
  const poolSize = pool.length;
  const btns = document.querySelectorAll('.count-btn');
  btns.forEach(btn=>{
    const n = parseInt(btn.textContent);
    const isMax = btn.classList.contains('max-btn');
    if(isMax) btn.classList.toggle('selected', chosenCount===poolSize);
    else btn.classList.toggle('selected', chosenCount===n);
  });
}

function validateCount(){
  const inp = document.getElementById('custom-count-input');
  const err = document.getElementById('custom-error');
  const note = document.getElementById('count-note');
  const val = inp.value.trim();
  if(val !== ''){
    const n = parseInt(val);
    if(isNaN(n)||n<1){ err.textContent='Enter a valid number.'; err.classList.remove('hidden'); updateLaunchBtn(false); return; }
    if(n>pool.length){ err.textContent=`Max available: ${pool.length}.`; err.classList.remove('hidden'); updateLaunchBtn(false); return; }
    err.classList.add('hidden');
    chosenCount = n;
    refreshCountGrid();
  } else {
    err.classList.add('hidden');
  }
  note.textContent = chosenCount ? `${chosenCount} question${chosenCount!==1?'s':''} selected` : '';
  updateLaunchBtn();
}

function updateLaunchBtn(){
  document.getElementById('launch-btn').disabled = !chosenCount || chosenCount < 1;
}

document.getElementById('custom-count-input').addEventListener('input', validateCount);
document.getElementById('count-back-btn').addEventListener('click',()=>show('screen-menu'));

// Shuffle toggle
const shuffleBox = document.getElementById('shuffle-count-box');
document.getElementById('shuffle-count-row').addEventListener('click',()=>{
  shuffleOn=!shuffleOn;
  shuffleBox.className='checkbox'+(shuffleOn?' on':'');
});

// Spinner buttons
function changeCustom(delta){
  const inp = document.getElementById('custom-count-input');
  let val = parseInt(inp.value)||0;
  val = Math.max(1,Math.min(pool.length,val+delta));
  inp.value=val;
  chosenCount=val;
  refreshCountGrid();
  validateCount();
}
function startSpin(delta){
  changeCustom(delta);
  spinTimer=setTimeout(()=>{ spinInterval=setInterval(()=>changeCustom(delta),80); },400);
}
function stopSpin(){ clearTimeout(spinTimer); clearInterval(spinInterval); }
document.getElementById('spin-up').addEventListener('mousedown',()=>startSpin(1));
document.getElementById('spin-down').addEventListener('mousedown',()=>startSpin(-1));
document.getElementById('spin-up').addEventListener('touchstart',e=>{e.preventDefault();startSpin(1);},{passive:false});
document.getElementById('spin-down').addEventListener('touchstart',e=>{e.preventDefault();startSpin(-1);},{passive:false});
['mouseup','mouseleave','touchend','touchcancel'].forEach(ev=>{
  document.getElementById('spin-up').addEventListener(ev,stopSpin);
  document.getElementById('spin-down').addEventListener(ev,stopSpin);
});

document.getElementById('launch-btn').addEventListener('click',()=>{
  if(!chosenCount) return;
  startExam();
});

// ── Exam ──
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

function startExam(){
  let p = [...pool];
  if(shuffleOn) p = shuffle(p);
  exam = p.slice(0,chosenCount);
  answers = {};
  flags = new Set();
  questionOptions = {};
  cur = 0;
  show('screen-exam');
  renderQuestion();
}

// Correct answer position: balanced A-E (20% each)
// We assign positions in round-robin across the exam to ensure ~20% each
let positionCycle = [];
function getCorrectPosition(idx){
  // Build cycle if needed
  if(positionCycle.length < exam.length){
    positionCycle = [];
    // Create evenly distributed sequence: 0=A,1=B,2=C,3=D,4=E
    const total = exam.length;
    for(let i=0;i<total;i++) positionCycle.push(i%5);
    shuffle(positionCycle);
  }
  return positionCycle[idx];
}

async function generateOptions(idx){
  if(questionOptions[idx]) return questionOptions[idx];
  
  const item = exam[idx];
  const correctPos = getCorrectPosition(idx);
  
  try {
    const prompt = `You are a histology exam question writer. Given this question and its correct answer, generate exactly 4 plausible but INCORRECT distractor options.

Question: ${item.q}
Correct answer: ${item.a}

Rules:
- Distractors must be plausible to a medical student but clearly wrong
- Keep distractors similar in style/length to the correct answer
- Do NOT include the correct answer
- Return ONLY a JSON array of 4 strings, nothing else

Example output: ["distractor one", "distractor two", "distractor three", "distractor four"]`;

    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:300,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await resp.json();
    const text = data.content[0].text.trim();
    const clean = text.replace(/```json|```/g,'').trim();
    let distractors = JSON.parse(clean);
    if(!Array.isArray(distractors)||distractors.length<4) throw new Error('bad response');
    distractors = distractors.slice(0,4);
    
    // Build options array: insert correct at correctPos
    const opts = [...distractors];
    opts.splice(correctPos,0,item.a);
    
    questionOptions[idx] = opts.map((text,i)=>({text,isCorrect:i===correctPos}));
  } catch(e) {
    // Fallback: just show correct answer with generic distractors
    const fallback = ['None of the above','All of the above','Cannot be determined','Insufficient information provided'];
    const opts = [...fallback];
    opts.splice(correctPos,0,item.a);
    questionOptions[idx] = opts.map((text,i)=>({text,isCorrect:i===correctPos}));
  }
  return questionOptions[idx];
}

async function renderQuestion(){
  const item = exam[cur];
  const sName = SECTIONS[item.sIdx].name;
  
  // Header
  document.getElementById('q-sec').textContent = sName;
  document.getElementById('q-sec').style.color = getComputedStyle(document.documentElement).getPropertyValue('--accent');
  document.getElementById('q-text').innerHTML = `<span class="q-num">Q${cur+1}.</span> ${item.q}`;
  document.getElementById('counter').textContent = `${cur+1} / ${exam.length}`;
  document.getElementById('progress-fill').style.width = `${((cur+1)/exam.length)*100}%`;
  document.getElementById('flag-btn').className = 'flag-btn'+(flags.has(cur)?' on':'');
  
  // Nav buttons
  document.getElementById('prev-btn').disabled = cur===0;
  const isLast = cur===exam.length-1;
  document.getElementById('next-btn').classList.toggle('hidden',isLast);
  document.getElementById('finish-btn').classList.toggle('hidden',!isLast);
  
  // Show loading skeleton if options aren't cached yet
  if(!questionOptions[cur]){
    const optsEl = document.getElementById('opts');
    optsEl.innerHTML = `
      <div class="loading-badge"><div class="loading-dot"></div> Generating options\u2026</div>
      <div class="loading-opts">
        ${[0,1,2,3,4].map(()=>`<div class="opt-skeleton"></div>`).join('')}
      </div>`;
    document.getElementById('reveal-btn').classList.add('hidden');
  }

  // Get options (may trigger API call)
  const opts = await generateOptions(cur);
  
  const optsEl = document.getElementById('opts');
  optsEl.innerHTML = '';
  const letters = ['A','B','C','D','E'];
  const ans = answers[cur];
  const revealed = ans && ans.chosen === -1;
  
  opts.forEach((opt,i)=>{
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="letter">${letters[i]}.</span>${opt.text}`;
    
    if(ans){
      if(opt.isCorrect){ btn.classList.add('correct'); }
      else if(ans.chosen===i){ btn.classList.add('wrong'); }
      else { btn.classList.add('dim'); }
      btn.disabled = true;
    } else {
      btn.addEventListener('click',()=>selectAnswer(i,opt.isCorrect));
    }
    optsEl.appendChild(btn);
  });
  
  // Reveal btn
  const revBtn = document.getElementById('reveal-btn');
  if(!ans){
    revBtn.classList.remove('hidden');
    revBtn.onclick = () => revealAnswer();
  } else {
    revBtn.classList.add('hidden');
  }
  
  // Silently pre-fetch next question's options in the background
  if(cur < exam.length-1 && !questionOptions[cur+1]){
    setTimeout(()=>generateOptions(cur+1).catch(()=>{}),500);
  }
}

function selectAnswer(chosenIdx, isCorrect){
  if(answers[cur]) return;
  answers[cur] = {chosen:chosenIdx, correct:isCorrect};
  renderQuestion();
}

function revealAnswer(){
  if(answers[cur]) return;
  answers[cur] = {chosen:-1, correct:false}; // sentinel: revealed
  renderQuestion();
}

document.getElementById('prev-btn').addEventListener('click',()=>{ if(cur>0){cur--;renderQuestion();} });
document.getElementById('next-btn').addEventListener('click',()=>{ if(cur<exam.length-1){cur++;renderQuestion();} });
document.getElementById('finish-btn').addEventListener('click',()=>showResults());
document.getElementById('flag-btn').addEventListener('click',()=>{
  if(flags.has(cur)) flags.delete(cur); else flags.add(cur);
  document.getElementById('flag-btn').className='flag-btn'+(flags.has(cur)?' on':'');
});

// Quit modal
document.getElementById('exit-btn').addEventListener('click',()=>document.getElementById('quit-modal').classList.remove('hidden'));
document.getElementById('modal-cancel').addEventListener('click',()=>document.getElementById('quit-modal').classList.add('hidden'));
document.getElementById('modal-confirm').addEventListener('click',()=>{
  document.getElementById('quit-modal').classList.add('hidden');
  show('screen-menu');
});

// ── Results ──
function showResults(){
  let correct=0,wrong=0,skipped=0;
  exam.forEach((_,i)=>{
    const a=answers[i];
    if(!a||a.chosen===-1) skipped++;
    else if(a.correct) correct++;
    else wrong++;
  });
  const pct = Math.round((correct/exam.length)*100);
  const pass = pct>=60;
  
  document.getElementById('res-emoji').textContent = pass?'🎉':'📚';
  document.getElementById('res-title').textContent = pass?'Great work!':'Keep studying!';
  const ring=document.getElementById('score-ring');
  ring.className='score-ring '+(pass?'pass':'fail');
  document.getElementById('res-pct').textContent=pct+'%';
  const badge=document.getElementById('grade-badge');
  badge.className='grade-badge '+(pass?'pass':'fail');
  badge.textContent=pass?'PASS':'FAIL';
  document.getElementById('r-correct').textContent=correct;
  document.getElementById('r-wrong').textContent=wrong;
  document.getElementById('r-skip').textContent=skipped;
  document.getElementById('r-flag').textContent=flags.size;
  document.getElementById('review-area').classList.add('hidden');
  show('screen-results');
}

document.getElementById('retry-btn').addEventListener('click',()=>{
  answers={}; flags=new Set(); cur=0;
  show('screen-exam'); renderQuestion();
});
document.getElementById('home-btn').addEventListener('click',()=>show('screen-menu'));
document.getElementById('review-btn').addEventListener('click',()=>{
  const area=document.getElementById('review-area');
  area.classList.toggle('hidden');
  if(!area.classList.contains('hidden')) renderReview('all');
});

// Filter buttons
document.querySelectorAll('.filterbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filterbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderReview(btn.dataset.f);
  });
});

function renderReview(filter){
  const cards=document.getElementById('review-cards');
  cards.innerHTML='';
  const letters=['A','B','C','D','E'];
  exam.forEach((item,i)=>{
    const a=answers[i];
    const isSkipped=!a||a.chosen===-1;
    const isCorrect=a&&a.correct;
    const isWrong=a&&!a.correct&&a.chosen!==-1;
    const isFlagged=flags.has(i);
    
    if(filter==='wrong'&&!isWrong) return;
    if(filter==='correct'&&!isCorrect) return;
    if(filter==='skipped'&&!isSkipped) return;
    if(filter==='flagged'&&!isFlagged) return;
    
    const opts=questionOptions[i];
    const cls=isCorrect?'rc-correct':isWrong?'rc-wrong':'rc-skipped';
    const correctText=opts?opts.find(o=>o.isCorrect)?.text:item.a;
    let chosenText='';
    if(opts&&a&&a.chosen>=0) chosenText=opts[a.chosen]?.text||'';
    
    const div=document.createElement('div');
    div.className=`review-card ${cls}`;
    div.innerHTML=`
      <div class="rc-sec">${SECTIONS[item.sIdx].name}</div>
      <div class="rc-q">Q${i+1}. ${item.q}</div>
      ${isSkipped?`<div class="rc-your rc-skip-ans">⊘ Skipped</div>`:''}
      ${isWrong?`<div class="rc-your rc-wrong-ans">✗ Your answer: ${chosenText}</div>`:''}
      ${isCorrect?`<div class="rc-your" style="color:var(--correct)">✓ Correct</div>`:''}
      <div class="rc-correct-ans">✓ ${correctText}</div>
      ${isFlagged?'<div class="flagged-tag">⚑ Flagged</div>':''}
    `;
    cards.appendChild(div);
  });
  if(!cards.innerHTML) cards.innerHTML='<p style="color:var(--muted);font-size:.82rem;text-align:center;padding:1rem;">No questions match this filter.</p>';
}

// ── Init ──
buildMenu();
show('screen-menu');
</script>
